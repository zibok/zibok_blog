server {
    listen       8080;
    listen  [::]:8080;
    server_name  blog.zibok.org;

    location / {
        root   /var/www/html;
        index  index.html;
    }

    #error_page  404              /404.html;

    # redirect server error pages to the static page /50x.html
    #
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}

