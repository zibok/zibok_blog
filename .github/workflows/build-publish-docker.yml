name: "Build and publish docker image"

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ghcr.io/zibok/zibok_blog:latest

  trigger-deployment:
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
      - name: Prepare SSH environment
        run: |
          mkdir -p /home/runner/.ssh
          echo "${{secrets.DEPLOY_SSH_KEY}}" > /home/runner/.ssh/deploy
          chmod -R 600 /home/runner/.ssh
          ssh-keyscan ${{secrets.DEPLOY_HOST}} >> /home/runner/.ssh/known_hosts

      - name: Trigger compose up for blog
        run: ssh -i /home/runner/.ssh/deploy ${{secrets.DEPLOY_USER}}@${{secrets.DEPLOY_HOST}} docker compose -f docker/docker-compose.yml up -d --pull always zibok_blog
